name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="/opt/bootcamp-management/extracurricular"
            cd "$APP_DIR"

            git fetch origin main
            git reset --hard origin/main

            cat > .env <<EOF
            POSTGRES_USER=${{ secrets.POSTGRES_USER || 'postgres' }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=postgres
            ENVIRONMENT=production
            LOG_LEVEL=INFO
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            JWT_ALGORITHM=HS256
            ACCESS_TOKEN_EXPIRE_MINUTES=60
            USER_SERVICE_URL=http://user_service:8000
            BOOTCAMP_SERVICE_URL=http://bootcamp_service:8000
            REGISTRATION_SERVICE_URL=http://registration_service:8000
            SHOWCASE_SERVICE_URL=http://showcase_service:8000
            USER_DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER || 'postgres' }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/user_db
            BOOTCAMP_DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER || 'postgres' }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/bootcamp_db
            REGISTRATION_DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER || 'postgres' }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/registration_db
            SHOWCASE_DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER || 'postgres' }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/showcase_db
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            GATEWAY_PORT=8000
            FRONTEND_PORT=3000
            EOF

            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps

            echo "Waiting for gateway health check..."
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8000/health; then
                echo "Deployment verified successfully."
                exit 0
              fi
              sleep 5
            done

            echo "Deployment verification failed."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=100 gateway
            exit 1
