name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: POSTGRES_USER,POSTGRES_PASSWORD,JWT_SECRET_KEY,NEXT_PUBLIC_API_URL,CORS_ORIGINS
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/home/ubuntu/bootcamp-management-system"
            BRANCH="main"
            COMPOSE_ARGS="-f docker-compose.yml -f docker-compose.prod.yml"

            log_failure() {
              echo "========== DEPLOYMENT FAILED =========="
              echo "Compose directory: ${COMPOSE_DIR:-unknown}"
              docker compose ${COMPOSE_ARGS} ps || true
              echo "---------- postgres logs ----------"
              docker compose ${COMPOSE_ARGS} logs --tail=100 postgres || true
              echo "---------- db_init logs ----------"
              docker compose ${COMPOSE_ARGS} logs --tail=100 db_init || true
              echo "---------- user_service logs ----------"
              docker compose ${COMPOSE_ARGS} logs --tail=100 user_service || true
              echo "---------- bootcamp_service logs ----------"
              docker compose ${COMPOSE_ARGS} logs --tail=100 bootcamp_service || true
              echo "---------- registration_service logs ----------"
              docker compose ${COMPOSE_ARGS} logs --tail=100 registration_service || true
              echo "---------- showcase_service logs ----------"
              docker compose ${COMPOSE_ARGS} logs --tail=100 showcase_service || true
              echo "---------- gateway logs ----------"
              docker compose ${COMPOSE_ARGS} logs --tail=100 gateway || true
              echo "---------- frontend logs ----------"
              docker compose ${COMPOSE_ARGS} logs --tail=100 frontend || true
            }
            trap 'log_failure' ERR

            if [ ! -d "$APP_DIR" ]; then
              echo "ERROR: APP_DIR does not exist: $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"

            if [ -f "docker-compose.yml" ]; then
              COMPOSE_DIR="$APP_DIR"
            elif [ -f "extracurricular/docker-compose.yml" ]; then
              COMPOSE_DIR="$APP_DIR/extracurricular"
            else
              echo "ERROR: docker-compose.yml not found under $APP_DIR"
              exit 1
            fi

            cd "$COMPOSE_DIR"
            echo "Using compose directory: $COMPOSE_DIR"

            if ! command -v docker >/dev/null 2>&1; then
              echo "ERROR: Docker is not installed on the EC2 instance."
              exit 1
            fi

            if ! docker compose version >/dev/null 2>&1; then
              echo "ERROR: Docker Compose plugin is not installed."
              echo "Install with: sudo apt-get update && sudo apt-get install -y docker-compose-plugin"
              exit 1
            fi

            echo "Docker version: $(docker --version)"
            echo "Docker Compose version: $(docker compose version)"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "ERROR: Git repository not found at $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
            cd "$COMPOSE_DIR"

            POSTGRES_USER="${POSTGRES_USER:-postgres}"
            if [ -z "${POSTGRES_PASSWORD:-}" ]; then
              echo "ERROR: POSTGRES_PASSWORD secret is not set in GitHub Actions."
              exit 1
            fi
            if [ -z "${JWT_SECRET_KEY:-}" ]; then
              echo "ERROR: JWT_SECRET_KEY secret is not set in GitHub Actions."
              exit 1
            fi
            if [ -z "${NEXT_PUBLIC_API_URL:-}" ]; then
              echo "ERROR: NEXT_PUBLIC_API_URL secret is not set in GitHub Actions."
              exit 1
            fi
            if [ -z "${CORS_ORIGINS:-}" ]; then
              echo "ERROR: CORS_ORIGINS secret is not set in GitHub Actions."
              exit 1
            fi

            export POSTGRES_PASSWORD
            ENCODED_PASSWORD=$(python3 -c "import os, urllib.parse; print(urllib.parse.quote(os.environ['POSTGRES_PASSWORD'], safe=''))")

            printf '%s\n' \
              "POSTGRES_USER=${POSTGRES_USER}" \
              "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" \
              "POSTGRES_DB=postgres" \
              "ENVIRONMENT=production" \
              "LOG_LEVEL=INFO" \
              "JWT_SECRET_KEY=${JWT_SECRET_KEY}" \
              "JWT_ALGORITHM=HS256" \
              "ACCESS_TOKEN_EXPIRE_MINUTES=60" \
              "USER_SERVICE_URL=http://user_service:8000" \
              "BOOTCAMP_SERVICE_URL=http://bootcamp_service:8000" \
              "REGISTRATION_SERVICE_URL=http://registration_service:8000" \
              "SHOWCASE_SERVICE_URL=http://showcase_service:8000" \
              "USER_DATABASE_URL=postgresql://${POSTGRES_USER}:${ENCODED_PASSWORD}@postgres:5432/user_db" \
              "BOOTCAMP_DATABASE_URL=postgresql://${POSTGRES_USER}:${ENCODED_PASSWORD}@postgres:5432/bootcamp_db" \
              "REGISTRATION_DATABASE_URL=postgresql://${POSTGRES_USER}:${ENCODED_PASSWORD}@postgres:5432/registration_db" \
              "SHOWCASE_DATABASE_URL=postgresql://${POSTGRES_USER}:${ENCODED_PASSWORD}@postgres:5432/showcase_db" \
              "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}" \
              "CORS_ORIGINS=${CORS_ORIGINS}" \
              "GATEWAY_PORT=8000" \
              "FRONTEND_PORT=3000" \
              > .env

            echo ".env file written for production deployment."

            docker compose ${COMPOSE_ARGS} up -d --build --remove-orphans
            docker compose ${COMPOSE_ARGS} ps

            echo "Waiting for gateway /health endpoint..."
            HEALTH_OK=false
            for i in $(seq 1 45); do
              if curl -fsS http://127.0.0.1:8000/health; then
                echo ""
                echo "Deployment verified successfully."
                HEALTH_OK=true
                break
              fi
              echo "Attempt ${i}/45: gateway not ready yet, retrying in 5s..."
              sleep 5
            done

            if [ "$HEALTH_OK" != "true" ]; then
              echo "ERROR: Gateway health check failed after 45 attempts."
              log_failure
              exit 1
            fi

            echo "Cleaning up unused Docker images..."
            docker image prune -f

            echo "Deployment completed successfully."
