apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: bootcamp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: gateway
          image: bootcamp-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: bootcamp-config
                  key: USER_SERVICE_URL
            - name: BOOTCAMP_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: bootcamp-config
                  key: BOOTCAMP_SERVICE_URL
            - name: REGISTRATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: bootcamp-config
                  key: REGISTRATION_SERVICE_URL
            - name: SHOWCASE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: bootcamp-config
                  key: SHOWCASE_SERVICE_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: bootcamp-secrets
                  key: JWT_SECRET_KEY
            - name: JWT_ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: bootcamp-config
                  key: JWT_ALGORITHM
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: bootcamp-config
                  key: CORS_ORIGINS
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: bootcamp-config
                  key: LOG_LEVEL
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: bootcamp-config
                  key: ENVIRONMENT
          livenessProbe:
            httpGet:
              path: /live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: bootcamp
spec:
  selector:
    app: gateway
  ports:
    - port: 8000
      targetPort: 8000
